<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#ECE8E0" />
<meta name="robots" content="noindex, nofollow" />
<title>Ladies Night</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600&family=Jost:wght@300;400&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Jost', -apple-system, sans-serif;
    background: #ECE8E0; color: #BC4B2B;
    min-height: 100svh; display: flex; align-items: center; justify-content: center;
    text-align: center; padding: 32px;
  }
  .eyebrow { font-size: 12px; letter-spacing: .34em; text-transform: uppercase; color: #C96A47; }
  h1 { font-family: 'Cormorant Garamond', serif; font-weight: 600; font-size: clamp(44px,14vw,72px); line-height: 1; margin: 8px 0 6px; }
  .sub { font-size: 12px; letter-spacing: .3em; text-transform: uppercase; color: #C96A47; }
  p { margin-top: 26px; color: #C96A47; font-size: 14px; letter-spacing: .03em; }
</style>
</head>
<body>
  <div>
    <p class="eyebrow">You're Invited to our</p>
    <h1>Ladies Night</h1>
    <p class="sub">Hosted by The YAM Guys</p>
    <p>Please tap your personal invitation card to view your reservation.</p>
  </div>
</body>
</html>
